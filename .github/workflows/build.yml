name: Build & Release

# Pushing a version tag like v1.02 triggers PyInstaller builds for Windows,
# macOS, and Linux, plus a .deb package and a source tarball, then attaches
# every artifact to a GitHub Release. workflow_dispatch lets you run the
# build manually (without publishing a release).
#
# Windows code signing via SignPath Foundation is opportunistic: if the
# SIGNPATH_API_TOKEN secret is set (and the three SIGNPATH_* repo variables
# are configured) the build signs the bundled .exe and the installer .exe;
# otherwise it produces unsigned artifacts and the build still succeeds.
# See the SignPath section further down for the exact setup.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  APP_NAME: "MyDocMaker"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: MyDocMaker-Windows
          - os: macos-latest
            artifact: MyDocMaker-macOS
          # Pinned to 22.04 so the PyInstaller bundle links against glibc
          # 2.35 — works on Pop!_OS 22.04, Ubuntu 22.04, Debian 12, Mint 21,
          # etc. Building on ubuntu-latest (24.04 / glibc 2.39) produced
          # bundles that crashed on Pop!_OS 22.04 with "GLIBC_2.38 not found".
          - os: ubuntu-22.04
            artifact: MyDocMaker-Linux

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Chromium for webpage capture
        run: python -m playwright install chromium

      # Convert the source PNG icon into platform-native formats so
      # PyInstaller can embed the right one in the .exe / .app /
      # taskbar metadata. Linux uses the PNG directly via
      # hicolor/.desktop, so no conversion needed there.
      - name: Generate platform icon (Windows .ico)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          python -c "from PIL import Image; im = Image.open('installer/icon.png'); im.save('installer/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
          Get-Item installer/icon.ico | Format-List Name,Length

      - name: Generate platform icon (macOS .icns)
        if: matrix.os == 'macos-latest'
        run: |
          # iconutil ships with macOS; sips downsizes.
          rm -rf installer/icon.iconset
          mkdir installer/icon.iconset
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz installer/icon.png \
              --out installer/icon.iconset/icon_${sz}x${sz}.png >/dev/null
            sips -z $(($sz * 2)) $(($sz * 2)) installer/icon.png \
              --out installer/icon.iconset/icon_${sz}x${sz}@2x.png >/dev/null
          done
          iconutil -c icns installer/icon.iconset -o installer/icon.icns
          ls -la installer/icon.icns

      # --collect-all bakes the browser engine and other data files into the
      # bundle so end users don't need to install anything else.
      # --icon embeds the platform icon into the executable / .app
      # bundle. --add-data ships the source PNG so the Tk window can
      # set iconphoto at runtime (works uniformly across all platforms).
      - name: Build executable (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: >
          pyinstaller --noconfirm --windowed --onedir
          --name "${{ env.APP_NAME }}"
          --add-data "installer/icon.png:."
          --collect-all playwright
          --collect-all tkinterdnd2
          --collect-all pillow_heif
          --collect-all pypdfium2
          --collect-all qrcode
          --collect-all pyhanko
          --collect-all cryptography
          --collect-submodules PIL
          mydocmaker.py

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >
          pyinstaller --noconfirm --windowed --onedir
          --name "${{ env.APP_NAME }}"
          --icon "installer/icon.ico"
          --add-data "installer/icon.png;."
          --collect-all playwright
          --collect-all tkinterdnd2
          --collect-all pillow_heif
          --collect-all pypdfium2
          --collect-all qrcode
          --collect-all pyhanko
          --collect-all cryptography
          --collect-submodules PIL
          --hidden-import win32com.client
          --hidden-import pythoncom
          --hidden-import pywintypes
          mydocmaker.py

      - name: Build executable (macOS)
        if: matrix.os == 'macos-latest'
        run: >
          pyinstaller --noconfirm --windowed --onedir
          --name "${{ env.APP_NAME }}"
          --icon "installer/icon.icns"
          --add-data "installer/icon.png:."
          --osx-bundle-identifier com.fixmoose.mydocmaker
          --collect-all playwright
          --collect-all tkinterdnd2
          --collect-all pillow_heif
          --collect-all pypdfium2
          --collect-all qrcode
          --collect-all pyhanko
          --collect-all cryptography
          --collect-submodules PIL
          mydocmaker.py

      # ---- Package per-OS -------------------------------------------------
      # ===================================================================
      # SignPath Foundation code signing (Windows only).
      #
      # When the SIGNPATH_API_TOKEN repository secret is set, the bundled
      # app .exe AND the Inno Setup installer .exe are submitted to
      # SignPath Foundation for signing with their EV certificate. The
      # signed binaries replace the unsigned ones before packaging /
      # release.
      #
      # When SIGNPATH_API_TOKEN is NOT set (forks, pre-approval, local
      # tests) all signing steps are skipped and the build behaves as
      # today, producing unsigned artifacts.
      #
      # Required secrets / variables (add in repo Settings → Secrets and
      # variables → Actions, after SignPath Foundation approves):
      #   • Secret:    SIGNPATH_API_TOKEN       (the API token from SignPath)
      #   • Variable:  SIGNPATH_ORG_ID          (your SignPath organisation id)
      #   • Variable:  SIGNPATH_PROJECT_SLUG    (the project slug in SignPath)
      #   • Variable:  SIGNPATH_POLICY_SLUG     (signing policy slug; usually
      #                                          'release-signing')
      # ===================================================================

      - name: Check SignPath signing config
        id: signpath_check
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          HAS_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SignPath signing enabled — bundled .exe and installer will be signed."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SignPath signing skipped (SIGNPATH_API_TOKEN secret not set). Build will produce UNSIGNED Windows artifacts and end users will see SmartScreen warnings."
          fi

      # ---- Sign the bundled app .exe BEFORE zipping/installer build,
      # so both the portable zip and the installer contain a signed .exe.
      - name: Upload unsigned bundled .exe for signing
        if: matrix.os == 'windows-latest' && steps.signpath_check.outputs.enabled == 'true'
        id: upload_unsigned_app
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-bundled-exe
          path: "dist/${{ env.APP_NAME }}/${{ env.APP_NAME }}.exe"
          retention-days: 1

      - name: Sign bundled .exe via SignPath
        if: matrix.os == 'windows-latest' && steps.signpath_check.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned_app.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-app

      - name: Replace bundled .exe with signed version
        if: matrix.os == 'windows-latest' && steps.signpath_check.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signed = "signed-app/${{ env.APP_NAME }}.exe"
          $target = "dist/${{ env.APP_NAME }}/${{ env.APP_NAME }}.exe"
          if (-not (Test-Path $signed)) {
            Write-Error "SignPath did not return a signed bundle .exe at $signed"
            Get-ChildItem -Recurse signed-app
            exit 1
          }
          Move-Item -Force $signed $target
          Write-Host "Replaced bundled .exe with signed copy."

      - name: Package (Windows portable zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path "${{ env.APP_NAME }}" -DestinationPath "../${{ matrix.artifact }}.zip"

      # Windows installer (Inno Setup) — adds right-click integration,
      # SendTo, Start Menu / Desktop shortcuts and a proper uninstaller.
      # Inno Setup is preinstalled on windows-latest as `iscc`. The /O.
      # flag forces output into the workspace root regardless of OutputDir
      # in the .iss file (which defaults relative to the script's location).
      - name: Build Windows installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $version = $env:GITHUB_REF -replace 'refs/tags/v',''
          } else {
            $version = '0.0.0'
          }
          Write-Host "Building installer for version $version"
          $iscc = (Get-Command iscc -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          & "$iscc" /Qp "/O$PWD" "/DAppVersion=$version" installer\windows.iss
          $exe = "MyDocMaker-Windows-Setup.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Inno Setup ran but $exe wasn't produced in $PWD"
            Get-ChildItem -Recurse -Filter "*Setup.exe"
            exit 1
          }
          Write-Host "Installer built:"
          Get-Item $exe | Format-List Name,Length

      # ---- Sign the Setup.exe so users see no SmartScreen when they
      # download and run it.
      - name: Upload unsigned installer for signing
        if: matrix.os == 'windows-latest' && steps.signpath_check.outputs.enabled == 'true'
        id: upload_unsigned_setup
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer-exe
          path: MyDocMaker-Windows-Setup.exe
          retention-days: 1

      - name: Sign installer via SignPath
        if: matrix.os == 'windows-latest' && steps.signpath_check.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned_setup.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-setup

      - name: Replace installer with signed version
        if: matrix.os == 'windows-latest' && steps.signpath_check.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signed = "signed-setup/MyDocMaker-Windows-Setup.exe"
          if (-not (Test-Path $signed)) {
            Write-Error "SignPath did not return a signed installer at $signed"
            Get-ChildItem -Recurse signed-setup
            exit 1
          }
          Move-Item -Force $signed MyDocMaker-Windows-Setup.exe
          Write-Host "Replaced installer with signed copy."

      # macOS: inject CFBundleDocumentTypes into the bundled Info.plist so
      # Finder offers "Open With MyDocMaker" for our file types.
      # Uses Python's stdlib plistlib (preinstalled on macOS runners) —
      # safer than shelling sed/plutil through nested XML.
      - name: Inject document types into macOS Info.plist
        if: matrix.os == 'macos-latest'
        run: |
          PLIST="dist/${APP_NAME}.app/Contents/Info.plist"
          if [ ! -f "$PLIST" ]; then
            echo "No .app produced — skipping Info.plist edit."
            exit 0
          fi
          python3 - "$PLIST" <<'PY'
          import plistlib, sys
          target = sys.argv[1]
          with open('installer/macos_document_types.plist', 'rb') as fh:
              doc_types = plistlib.load(fh)
          with open(target, 'rb') as fh:
              info = plistlib.load(fh)
          info['CFBundleDocumentTypes'] = doc_types
          # Also bump the bundle identifier so Launch Services treats
          # this build as a real registered app, not the generic PyInstaller default.
          info.setdefault('CFBundleIdentifier', 'com.fixmoose.mydocmaker')
          with open(target, 'wb') as fh:
              plistlib.dump(info, fh)
          print("Injected CFBundleDocumentTypes:", [t.get('CFBundleTypeName') for t in doc_types])
          PY

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          if [ -d "${{ env.APP_NAME }}.app" ]; then
            zip -r "../${{ matrix.artifact }}.zip" "${{ env.APP_NAME }}.app"
          else
            zip -r "../${{ matrix.artifact }}.zip" "${{ env.APP_NAME }}"
          fi

      - name: Package (Linux portable tarball)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          cd dist
          tar -czf "../${{ matrix.artifact }}.tar.gz" "${{ env.APP_NAME }}"

      # ---- Linux-only: build a proper .deb package ------------------------
      - name: Build .deb package (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          # Derive a clean version: drop the leading "v" for tag pushes,
          # fall back to 0.0.0 for manual runs.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0+manual"
          fi
          echo "Building .deb for version $VERSION"

          PKG=mydocmaker
          ROOT="debpkg/${PKG}_${VERSION}_amd64"
          mkdir -p "$ROOT/DEBIAN" \
                   "$ROOT/opt/${PKG}" \
                   "$ROOT/usr/bin" \
                   "$ROOT/usr/share/applications" \
                   "$ROOT/usr/share/nautilus-python/extensions" \
                   "$ROOT/usr/share/icons/hicolor/512x512/apps" \
                   "$ROOT/usr/share/icons/hicolor/256x256/apps"

          # Install icon at two common hicolor sizes so file managers,
          # app launchers, and the Dock pick up a crisp version. We
          # downsize the source 1024x1024 PNG with Pillow.
          python3 - <<'PY'
          from PIL import Image
          src = Image.open("installer/icon.png")
          src.resize((512, 512), Image.LANCZOS).save(
              "icon_512.png", "PNG", optimize=True)
          src.resize((256, 256), Image.LANCZOS).save(
              "icon_256.png", "PNG", optimize=True)
          PY
          cp icon_512.png "$ROOT/usr/share/icons/hicolor/512x512/apps/${PKG}.png"
          cp icon_256.png "$ROOT/usr/share/icons/hicolor/256x256/apps/${PKG}.png"

          # Nautilus extension — adds a top-level right-click entry
          # "Add to MyDocMaker" so users don't have to dig through
          # the Open With submenu. Needs python3-nautilus at runtime,
          # which we declare as a Recommends below.
          cp installer/nautilus_extension.py \
             "$ROOT/usr/share/nautilus-python/extensions/mydocmaker.py"

          # Drop the PyInstaller bundle under /opt/mydocmaker
          cp -r "dist/${APP_NAME}/." "$ROOT/opt/${PKG}/"

          # Icon: use the freedesktop standard 'application-pdf' icon name
          # (set in the .desktop file below). This is the same look v1.01
          # had — the user's icon theme provides the actual PDF glyph,
          # which is more visually consistent with the rest of their
          # system than a custom-branded square.

          # Launcher in /usr/bin so users get a `mydocmaker` command
          # that also forwards file arguments from "Open With" / argv.
          cat > "$ROOT/usr/bin/${PKG}" <<EOF
          #!/bin/sh
          exec "/opt/${PKG}/${APP_NAME}" "\$@"
          EOF
          chmod +x "$ROOT/usr/bin/${PKG}"

          # Desktop launcher: %F passes 1-or-more selected files in a single
          # invocation; MimeType= makes the app show up in the file manager
          # right-click "Open With" submenu for those types. Icon= (added
          # in v1.15) is what lets us appear in the *primary* Open With
          # list — apps without an icon get demoted to "Other Application…".
          cat > "$ROOT/usr/share/applications/${PKG}.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=${APP_NAME}
          GenericName=PDF Builder
          Comment=Combine images, PDFs, documents and webpages into one PDF
          Icon=mydocmaker
          Exec=${PKG} %F
          Terminal=false
          Categories=Office;Utility;
          Keywords=pdf;merge;combine;convert;image;office;
          MimeType=image/png;image/jpeg;image/gif;image/bmp;image/tiff;image/webp;image/x-icon;image/heic;image/heif;image/avif;application/pdf;text/plain;text/markdown;text/csv;text/html;text/css;text/x-python;application/json;application/xml;application/x-yaml;application/x-shellscript;application/rtf;application/msword;application/vnd.openxmlformats-officedocument.wordprocessingml.document;application/vnd.oasis.opendocument.text;application/vnd.ms-excel;application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;application/vnd.oasis.opendocument.spreadsheet;application/vnd.ms-powerpoint;application/vnd.openxmlformats-officedocument.presentationml.presentation;application/vnd.oasis.opendocument.presentation;
          StartupNotify=true
          EOF

          # postinst: prints a clear "you're good, here's how to launch"
          # banner after dpkg finishes. Without this, users see only the
          # technical apt output ("Setting up… / Processing triggers…") and
          # often think nothing happened.
          cat > "$ROOT/DEBIAN/postinst" <<'EOF'
          #!/bin/sh
          set -e

          # ANSI colors when stdout is a tty (apt usually keeps this true).
          if [ -t 1 ]; then
            G="$(printf '\033[32m')"   # green
            B="$(printf '\033[1m')"    # bold
            D="$(printf '\033[2m')"    # dim
            R="$(printf '\033[0m')"    # reset
          else
            G=""; B=""; D=""; R=""
          fi

          case "$1" in
            configure)
              echo ""
              echo "${G}${B}  ✓ MyDocMaker installed.${R}"
              echo ""
              echo "  ${B}Launch it:${R}"
              echo "    • From your apps menu: search ${B}Drag${R}"
              echo "    • From a terminal:     ${B}mydocmaker${R}"
              echo "    • Right-click any file → ${B}Add to MyDocMaker${R}"
              echo "      (top-level entry, no submenu — needs python3-nautilus,"
              echo "       which apt installs alongside if you accepted Recommends)"
              echo ""
              echo "  ${D}If the right-click entry doesn't appear immediately, restart${R}"
              echo "  ${D}Nautilus once:${R}   nautilus -q"
              echo ""
              echo "  ${D}If the menu icon looks generic instead of our red MyDocMaker${R}"
              echo "  ${D}circle, log out + log back in once — GNOME Shell caches${R}"
              echo "  ${D}app icons in memory and Wayland has no live-reload trick.${R}"
              echo ""
              echo "  ${D}Optional: install LibreOffice for Office docs, sane-utils for the${R}"
              echo "  ${D}Scan button. The app shows a one-click 'Install…' banner if either${R}"
              echo "  ${D}is missing.${R}"
              echo ""
              echo "  ${D}Issues / feedback:${R} https://github.com/fixmoose/mydocmaker/issues"
              echo ""
              # Refresh the desktop database so the menu entry appears
              # immediately on GNOME / KDE / etc. without a logout.
              if command -v update-desktop-database >/dev/null 2>&1; then
                update-desktop-database -q /usr/share/applications 2>/dev/null || true
              fi
              # Refresh the icon cache so the new .png is picked up by
              # the file manager's "Open With" panel without restarting.
              if command -v gtk-update-icon-cache >/dev/null 2>&1; then
                gtk-update-icon-cache -q -t /usr/share/icons/hicolor 2>/dev/null || true
              fi
              # Refresh the MIME database — needed so our MimeType=
              # registrations from the .desktop file take effect on
              # distros that don't run update-mime-database from triggers.
              if command -v update-mime-database >/dev/null 2>&1; then
                update-mime-database /usr/share/mime 2>/dev/null || true
              fi
              ;;
          esac
          exit 0
          EOF
          chmod 755 "$ROOT/DEBIAN/postinst"

          # postrm: brief confirmation when the package is removed so the
          # user knows the uninstall completed.
          cat > "$ROOT/DEBIAN/postrm" <<'EOF'
          #!/bin/sh
          set -e
          if [ -t 1 ]; then
            B="$(printf '\033[1m')"
            R="$(printf '\033[0m')"
          else
            B=""; R=""
          fi
          case "$1" in
            remove|purge)
              echo ""
              echo "  MyDocMaker has been removed."
              echo "  ${B}Reinstall any time:${R} sudo apt install ./mydocmaker_*.deb"
              echo ""
              if command -v update-desktop-database >/dev/null 2>&1; then
                update-desktop-database -q /usr/share/applications 2>/dev/null || true
              fi
              ;;
          esac
          exit 0
          EOF
          chmod 755 "$ROOT/DEBIAN/postrm"

          # Compute installed size in KB (dpkg expects this in the control file)
          INSTALLED_SIZE=$(du -sk "$ROOT" | cut -f1)

          cat > "$ROOT/DEBIAN/control" <<EOF
          Package: ${PKG}
          Version: ${VERSION}
          Section: utility
          Priority: optional
          Architecture: amd64
          Installed-Size: ${INSTALLED_SIZE}
          Recommends: libreoffice, sane-utils, python3-nautilus
          Maintainer: fixmoose <fixmoose@users.noreply.github.com>
          Description: Cross-platform drag-and-drop PDF builder
           A free PDF maker. Drop in files (images, HEIC, PDFs, text, Office
           docs) or paste a website URL to capture a webpage as PDF. Combine,
           reorder, and save. No coding required.
          EOF

          dpkg-deb --build --root-owner-group "$ROOT"
          mv "debpkg/${PKG}_${VERSION}_amd64.deb" "./${PKG}_${VERSION}_amd64.deb"
          ls -la "${PKG}_${VERSION}_amd64.deb"

      # ---- Linux-only: source tarball -------------------------------------
      - name: Build source tarball (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          # Stage just the source files (no build artifacts, no .git)
          STAGE=source-stage/MyDocMaker-Source
          mkdir -p "$STAGE"
          cp mydocmaker.py requirements.txt README.md LICENSE CHANGELOG.md "$STAGE/"
          cp -r .github "$STAGE/"
          tar -C source-stage -czf MyDocMaker-Source.tar.gz MyDocMaker-Source

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.zip
            *.tar.gz
            *.deb
            *.exe

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p out
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.deb' -o -name '*.exe' \) -exec mv {} out/ \;
          ls -la out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          body: |
            ## MyDocMaker ${{ github.ref_name }}

            Download the file for your operating system below, unzip/install it, and run it.
            No coding or Python install needed.

            - **Windows (installer)**: `MyDocMaker-Windows-Setup.exe` → run → next, next, finish. Adds right-click "Open With", SendTo, Start Menu shortcut, and an uninstaller.
            - **Windows (portable)**: `MyDocMaker-Windows.zip` → unzip → double-click the app
            - **macOS**: `MyDocMaker-macOS.zip` → unzip → right-click the app → Open. Finder will offer "Open With MyDocMaker" for supported files.
            - **Linux (.deb)**: `mydocmaker_*_amd64.deb` → double-click in your file manager, or `sudo apt install ./mydocmaker_*_amd64.deb`
            - **Linux (portable)**: `MyDocMaker-Linux.tar.gz` → extract → run the app
            - **Source**: `MyDocMaker-Source.tar.gz` → for developers — see the README

            > First-launch note: because this free app is not code-signed, Windows
            > may show "Windows protected your PC" (click *More info → Run anyway*)
            > and macOS may say it's from an unidentified developer (right-click →
            > Open the first time). This is normal for free open-source software.
